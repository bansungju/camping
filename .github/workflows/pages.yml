name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # 배포 게이트: 익스포트된 가격이 카테고리 대비 '말이 안 되는' 값이면 배포 중단.
      #   (쉘터 GHE 2,167원 사건 재발 방지 — 원인 무관하게 결과 JSON을 검증)
      - name: Validate exported prices
        run: python3 pipeline/check_export.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site            # site/ 폴더만 배포 → <user>.github.io/camping/ 가 index.html
      - id: deployment
        uses: actions/deploy-pages@v4
