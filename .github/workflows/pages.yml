name: Deploy site to GitHub Pages

# 이 repo(public camping)는 배포 산출물 site/ 만 보유.
# 보안·정합성 게이트와 빌드는 비공개 SSOT(bansungju/gear-forest)에서 수행되며,
# gear-forest가 검증된 site/ 를 이 repo로 push → 아래 워크플로가 Pages로 배포한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
