<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1920px; overflow: hidden; background: #2f7a4e; font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.label-top { color: #fff; font-size: 52px; font-weight: 700; text-align: center; margin-bottom: 48px; line-height: 1.3; }
.phone-wrap { width: 540px; height: 1080px; background: #111; border-radius: 64px; border: 10px solid #333; position: relative; overflow: hidden; display: flex; flex-direction: column; }
.notch { width: 140px; height: 28px; background: #111; border-radius: 0 0 20px 20px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10; }
.screen { flex: 1; margin-top: 28px; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
.header { padding: 18px 24px 14px; border-bottom: 1px solid #eee; font-size: 22px; color: #888; }
.img-area { width: 100%; height: 220px; background: #f0f4f2; display: flex; align-items: center; justify-content: center; }
.body { padding: 20px 24px; flex: 1; }
.brand { font-size: 20px; color: #888; margin-bottom: 4px; }
.name { font-size: 30px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.price { font-size: 34px; font-weight: 700; color: #2f7a4e; margin-bottom: 6px; }
.rank { font-size: 20px; color: #666; margin-bottom: 18px; }
.spec-hd { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
.spec-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
.sl { font-size: 20px; color: #888; }
.sv-wrap { display: flex; align-items: center; gap: 10px; }
.sv { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.stars { font-size: 20px; color: #f5c842; }
.btn { margin: 16px 0 0; background: #2f7a4e; color: #fff; border-radius: 16px; padding: 18px 0; text-align: center; font-size: 24px; font-weight: 600; }
.tabbar { display: flex; background: #fff; border-top: 1px solid #eee; padding: 14px 0 10px; }
.tab { flex: 1; text-align: center; font-size: 18px; color: #bbb; }
.tab.active { color: #2f7a4e; font-weight: 600; }
.tab-icon { font-size: 28px; display: block; margin-bottom: 2px; }
</style>
</head>
<body>
<div class="label-top">실측값 기반<br>정직한 별점</div>
<div class="phone-wrap">
  <div class="notch"></div>
  <div class="screen">
    <div class="header">홈 &gt; 백패킹 텐트 &gt; 니모이큅먼트 호넷 엘리트 오스모 1P</div>
    <div class="img-area">
      <svg width="160" height="140" viewBox="0 0 160 140"><polygon points="80,10 148,118 12,118" fill="#9bc4b0" opacity="0.7"/><polygon points="80,22 136,118 24,118" fill="#6ba889"/><rect x="68" y="118" width="24" height="16" rx="3" fill="#8B6914"/></svg>
    </div>
    <div class="body">
      <div class="brand">니모이큅먼트</div>
      <div class="name">호넷 엘리트 오스모 1P</div>
      <div class="price">592,200원</div>
      <div class="rank">백패킹 텐트 53위 / 137개 비교</div>
      <div class="spec-hd">실측 스펙</div>
      <div class="spec-row"><span class="sl">최소무게</span><div class="sv-wrap"><span class="sv">812g</span><span class="stars">★★★★★</span></div></div>
      <div class="spec-row"><span class="sl">내수압</span><div class="sv-wrap"><span class="sv">1200mm</span><span class="stars">★☆☆☆☆</span></div></div>
      <div class="spec-row"><span class="sl">바닥면적</span><div class="sv-wrap"><span class="sv">2.25m²</span><span class="stars">★★★★☆</span></div></div>
      <div class="spec-row"><span class="sl">수용인원</span><div class="sv-wrap"><span class="sv">1인</span></div></div>
      <div class="btn">구매하기</div>
    </div>
    <div class="tabbar">
      <div class="tab"><span class="tab-icon">⌂</span>홈</div>
      <div class="tab active"><span class="tab-icon">◎</span>탐색</div>
      <div class="tab"><span class="tab-icon">◇</span>커뮤</div>
      <div class="tab"><span class="tab-icon">⊙</span>마이</div>
    </div>
  </div>
</div>
</body>
</html>
