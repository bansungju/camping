<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1920px; overflow: hidden; background: #2f7a4e; font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.label-top { color: #fff; font-size: 52px; font-weight: 700; text-align: center; margin-bottom: 48px; line-height: 1.3; }
.phone-wrap { width: 540px; height: 1080px; background: #111; border-radius: 64px; border: 10px solid #333; position: relative; overflow: hidden; display: flex; flex-direction: column; }
.notch { width: 140px; height: 28px; background: #111; border-radius: 0 0 20px 20px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10; }
.screen { flex: 1; margin-top: 28px; background: #fff; display: flex; flex-direction: column; }
.header { padding: 20px 24px 16px; border-bottom: 1px solid #eee; font-size: 32px; font-weight: 700; color: #1a1a1a; }
.post { padding: 18px 24px; border-bottom: 1px solid #f0f0f0; }
.pcat { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 18px; font-weight: 500; margin-bottom: 8px; }
.cat-review { background: #f0f7f3; color: #2f7a4e; }
.cat-q { background: #fff8e6; color: #9a6800; }
.cat-tip { background: #f0f0ff; color: #5555cc; }
.ptitle { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; line-height: 1.4; }
.pmeta { display: flex; justify-content: space-between; align-items: center; }
.pinfo { font-size: 18px; color: #aaa; }
.pstars { font-size: 20px; color: #f5c842; }
.plikes { font-size: 18px; color: #aaa; }
.spacer { flex: 1; }
.tabbar { display: flex; background: #fff; border-top: 1px solid #eee; padding: 14px 0 10px; }
.tab { flex: 1; text-align: center; font-size: 18px; color: #bbb; }
.tab.active { color: #2f7a4e; font-weight: 600; }
.tab-icon { font-size: 28px; display: block; margin-bottom: 2px; }
</style>
</head>
<body>
<div class="label-top">캠퍼 커뮤니티<br>사용기 · 질문 · 꿀팁</div>
<div class="phone-wrap">
  <div class="notch"></div>
  <div class="screen">
    <div class="header">커뮤니티</div>
    <div class="post">
      <div class="pcat cat-review">사용기</div>
      <div class="ptitle">호넷 엘리트 1P 한달 사용 후기</div>
      <div class="pmeta"><span class="pinfo">트레일워커 · 3시간 전</span><span class="pstars">★★★★★</span></div>
    </div>
    <div class="post">
      <div class="pcat cat-q">질문</div>
      <div class="ptitle">4계절 침낭 추천해주세요 예산 15만원</div>
      <div class="pmeta"><span class="pinfo">초보캠퍼 · 5시간 전</span><span class="plikes">답글 4</span></div>
    </div>
    <div class="post">
      <div class="pcat cat-tip">꿀팁</div>
      <div class="ptitle">백패킹 무게 줄이는 방법 총정리</div>
      <div class="pmeta"><span class="pinfo">그리너 · 1일 전</span><span class="plikes">좋아요 12</span></div>
    </div>
    <div class="post">
      <div class="pcat cat-review">사용기</div>
      <div class="ptitle">씨투써밋 스파크 SP3 경량 침낭 리뷰</div>
      <div class="pmeta"><span class="pinfo">산책러 · 2일 전</span><span class="pstars">★★★★☆</span></div>
    </div>
    <div class="post">
      <div class="pcat cat-q">질문</div>
      <div class="ptitle">헬리녹스 체어제로 vs 체어원 뭐가 나을까요?</div>
      <div class="pmeta"><span class="pinfo">주말캠퍼 · 3일 전</span><span class="plikes">답글 7</span></div>
    </div>
    <div class="spacer"></div>
    <div class="tabbar">
      <div class="tab"><span class="tab-icon">⌂</span>홈</div>
      <div class="tab"><span class="tab-icon">◎</span>탐색</div>
      <div class="tab active"><span class="tab-icon">◇</span>커뮤</div>
      <div class="tab"><span class="tab-icon">⊙</span>마이</div>
    </div>
  </div>
</div>
</body>
</html>
