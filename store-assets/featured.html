<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 500px; overflow: hidden; }
  body {
    background: radial-gradient(120% 140% at 80% 10%, #1e5234 0%, #173d27 55%, #122e1d 100%);
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    position: relative;
  }
  .deco { position: absolute; border-radius: 50%; }
  .d1 { width: 400px; height: 400px; background: #1e5234; opacity: .45; top: -140px; right: 60px; }
  .d2 { width: 360px; height: 360px; background: #1a4830; opacity: .4; bottom: -160px; right: -40px; }
  .d3 { width: 240px; height: 240px; background: #1a4830; opacity: .4; bottom: -120px; left: -60px; }

  .left { position: absolute; left: 64px; top: 96px; width: 560px; }
  .brandrow { display: flex; align-items: center; gap: 22px; }
  .icon { width: 104px; height: 104px; border-radius: 26px; flex-shrink: 0; overflow: hidden;
          box-shadow: 0 10px 28px rgba(0,0,0,.32); }
  .icon img { width: 104px; height: 104px; display: block; }
  .name { font-size: 60px; font-weight: 800; color: #fff; letter-spacing: -2px; line-height: 1; }
  .tagline { font-size: 25px; color: #d6efe0; margin-top: 22px; font-weight: 600; letter-spacing: -0.4px; }
  .pills { display: flex; gap: 10px; margin-top: 22px; }
  .pill { background: rgba(255,255,255,.12); border: 1px solid rgba(168,213,187,.35); color: #eafff2;
          font-size: 15px; font-weight: 600; padding: 9px 16px; border-radius: 20px; }
  .sub { font-size: 18px; color: #7dc49a; margin-top: 40px; font-weight: 500; }
  .url { font-size: 17px; color: #4a8f68; margin-top: 14px; font-weight: 600; }

  .cards { position: absolute; right: 56px; top: 50px; width: 380px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 14px; }
  .card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 14px 36px rgba(0,0,0,.28); }
  .card.sm { width: 183px; }
  .card.wide { width: 380px; display: flex; align-items: center; }
  .thumb { width: 100%; height: 122px; background: #f4f7f5; display: flex; align-items: center; justify-content: center; padding: 9px; }
  .thumb img { width: 100%; height: 100%; object-fit: contain; }
  .card.wide .thumb { width: 134px; height: 118px; flex-shrink: 0; }
  .info { padding: 11px 13px; }
  .card.wide .info { padding: 12px 16px; }
  .brand { font-size: 12px; color: #8a8a8a; }
  .model { font-size: 14px; font-weight: 700; color: #1a1a1a; line-height: 1.25; margin-top: 2px;
           display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .price { font-size: 16px; font-weight: 800; color: #2f7a4e; margin-top: 6px; }
  .tag { display: inline-block; font-size: 11px; color: #2f7a4e; background: #eaf4ee; border-radius: 8px;
         padding: 3px 9px; margin-top: 8px; font-weight: 600; }
</style>
</head>
<body>
  <div class="deco d1"></div><div class="deco d2"></div><div class="deco d3"></div>

  <div class="left">
    <div class="brandrow">
      <div class="icon"><img src="icon-play-512.png" alt="장비의 숲"></div>
      <div class="name">장비의 숲</div>
    </div>
    <div class="tagline">내 캠핑 스타일에 맞는 장비를 데이터로 찾아드려요</div>
    <div class="pills">
      <div class="pill">2,300여 개 모델</div>
      <div class="pill">16개 카테고리</div>
      <div class="pill">스펙 기반 별점</div>
    </div>
    <div class="sub">측정값만 비교 · 같은 그룹 안 환산 별점 · 가성비 랭킹</div>
    <div class="url">gear-forest.com</div>
  </div>

  <div class="cards">
    <div class="row">
      <div class="card sm">
        <div class="thumb"><img src="https://gear-forest.com/images/105.jpg"></div>
        <div class="info">
          <div class="brand">니모이큅먼트</div>
          <div class="model">호넷 엘리트 오스모 1P</div>
          <div class="price">592,200원</div>
        </div>
      </div>
      <div class="card sm">
        <div class="thumb"><img src="https://gear-forest.com/images/4215.jpg"></div>
        <div class="info">
          <div class="brand">헬리녹스</div>
          <div class="model">15주년 체어원</div>
          <div class="price">254,430원</div>
        </div>
      </div>
    </div>
    <div class="card wide">
      <div class="thumb"><img src="https://gear-forest.com/images/995.jpg"></div>
      <div class="info">
        <div class="brand">씨투써밋</div>
        <div class="model">글로우 GW1 퀼트 침낭</div>
        <div class="price">197,200원</div>
        <span class="tag">침낭 · 244개 모델 비교</span>
      </div>
    </div>
  </div>
</body>
</html>
