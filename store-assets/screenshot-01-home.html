<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1920px; overflow: hidden; background: #2f7a4e; font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.label-top { color: #fff; font-size: 52px; font-weight: 700; text-align: center; margin-bottom: 48px; line-height: 1.3; }
.phone-wrap { width: 540px; height: 1080px; background: #111; border-radius: 64px; border: 10px solid #333; position: relative; overflow: hidden; display: flex; flex-direction: column; }
.notch { width: 140px; height: 28px; background: #111; border-radius: 0 0 20px 20px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10; }
.screen { flex: 1; margin-top: 28px; background: #fff; display: flex; flex-direction: column; }
.header { padding: 28px 28px 18px; border-bottom: 1px solid #eee; }
.logo { font-size: 38px; font-weight: 700; color: #1a1a1a; }
.notice { background: #fffbee; border-radius: 12px; padding: 16px 18px; margin: 18px 24px; font-size: 22px; color: #7a6000; line-height: 1.5; }
.section-h { padding: 22px 28px 6px; font-size: 30px; font-weight: 700; color: #1a1a1a; }
.section-sub { padding: 0 28px 14px; font-size: 20px; color: #888; }
.search { margin: 0 28px 22px; background: #f5f5f5; border-radius: 20px; padding: 16px 22px; font-size: 22px; color: #aaa; }
.section-s { padding: 0 28px 14px; font-size: 26px; font-weight: 600; color: #1a1a1a; }
.cards { display: flex; gap: 16px; padding: 0 28px 22px; }
.card { width: 190px; background: #f9f9f9; border-radius: 14px; overflow: hidden; flex-shrink: 0; }
.cimg { width: 190px; height: 130px; background: #e8ede9; display: flex; align-items: center; justify-content: center; }
.cinfo { padding: 10px 12px; }
.cbrand { font-size: 18px; color: #888; }
.cname { font-size: 20px; font-weight: 600; color: #1a1a1a; line-height: 1.3; }
.cprice { font-size: 20px; color: #2f7a4e; font-weight: 600; margin-top: 4px; }
.hot-row { background: #f9f9f9; border-radius: 14px; padding: 18px 22px; margin: 0 28px 12px; font-size: 26px; font-weight: 500; color: #1a1a1a; }
.spacer { flex: 1; }
.tabbar { display: flex; background: #fff; border-top: 1px solid #eee; padding: 14px 0 10px; }
.tab { flex: 1; text-align: center; font-size: 18px; color: #bbb; }
.tab.active { color: #2f7a4e; font-weight: 600; }
.tab-icon { font-size: 28px; display: block; margin-bottom: 2px; }
</style>
</head>
<body>
<div class="label-top">2,300개 캠핑 장비<br>한 곳에서</div>
<div class="phone-wrap">
  <div class="notch"></div>
  <div class="screen">
    <div class="header"><div class="logo">장비의 숲</div></div>
    <div class="notice">⭐ 별점은 같은 그룹 안에서의 순위를 환산한 값이에요. 측정값만 쓰고, 추측은 없습니다.</div>
    <div class="section-h">무엇을 찾으세요?</div>
    <div class="section-sub">2,277개 모델 · 16개 카테고리 스펙 비교</div>
    <div class="search">브랜드·모델 검색 (예: 헬리녹스, 호넷...)</div>
    <div class="section-s">최근 본 상품</div>
    <div class="cards">
      <div class="card">
        <div class="cimg"><svg width="90" height="80" viewBox="0 0 90 80"><polygon points="45,6 80,66 10,66" fill="#9bc4b0" opacity="0.7"/><polygon points="45,16 72,66 18,66" fill="#6ba889"/><rect x="38" y="66" width="14" height="10" rx="2" fill="#8B6914"/></svg></div>
        <div class="cinfo"><div class="cbrand">니모이큅먼트</div><div class="cname">호넷 엘리트 1P</div><div class="cprice">592,200원</div></div>
      </div>
      <div class="card">
        <div class="cimg"><svg width="90" height="80" viewBox="0 0 90 80"><ellipse cx="45" cy="40" rx="36" ry="22" fill="#9bc4b0" opacity="0.7"/><ellipse cx="45" cy="36" rx="26" ry="16" fill="#6ba889"/><ellipse cx="45" cy="30" rx="14" ry="10" fill="#5a9878"/></svg></div>
        <div class="cinfo"><div class="cbrand">네이처하이크</div><div class="cname">BE400 코튼</div><div class="cprice">65,515원</div></div>
      </div>
    </div>
    <div class="section-s">🔥 이번 주 인기</div>
    <div class="hot-row">⛺ 백패킹텐트</div>
    <div class="hot-row">🛏 침낭</div>
    <div class="hot-row">🪑 캠핑의자</div>
    <div class="spacer"></div>
    <div class="tabbar">
      <div class="tab active"><span class="tab-icon">⌂</span>홈</div>
      <div class="tab"><span class="tab-icon">◎</span>탐색</div>
      <div class="tab"><span class="tab-icon">◇</span>커뮤</div>
      <div class="tab"><span class="tab-icon">⊙</span>마이</div>
    </div>
  </div>
</div>
</body>
</html>
