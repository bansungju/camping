<script>renderAccount();</script>
<script type="module">
import { initAuth, signInWithOAuth, signOut, getErrorMessage } from './supabaseClient.js'

const section = document.getElementById('auth-section')

function renderLogin() {
  section.innerHTML = `
    <div style="max-width:360px;margin:0 auto;text-align:center;padding:32px 0">
      <div style="font-size:48px;margin-bottom:16px">🌲</div>
      <h2 style="margin:0 0 8px;font-size:20px">장비의 숲 로그인</h2>
      <p style="color:var(--muted);font-size:14px;margin:0 0 28px">로그인하면 찜 목록을 여러 기기에서 동기화할 수 있어요.</p>
      <button id="btn-google" style="
        width:100%;padding:13px;border-radius:8px;border:1.5px solid #e0e0e0;
        background:#fff;cursor:pointer;font-size:15px;font-weight:600;
        display:flex;align-items:center;justify-content:center;gap:10px;
        box-shadow:0 1px 4px rgba(0,0,0,.08)">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.3l7.8 6.1C12.2 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.6A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6L2.5 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.4 0-11.8-3.7-13.6-9.3l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
        Google로 로그인
      </button>
      <p id="auth-error" style="color:#e53e3e;font-size:13px;margin-top:12px;display:none"></p>
    </div>`

  document.getElementById('btn-google').addEventListener('click', async () => {
    const btn = document.getElementById('btn-google')
    btn.disabled = true
    btn.textContent = '로그인 중…'
    const { error } = await signInWithOAuth('google')
    if (error) {
      document.getElementById('auth-error').textContent = getErrorMessage(error)
      document.getElementById('auth-error').style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Google로 로그인'
    }
  })
}

function renderProfile(user) {
  const nickname = user.user_metadata?.nickname ?? user.email ?? '사용자'
  section.innerHTML = `
    <div style="max-width:360px;margin:0 auto;padding:24px 0">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px">
        ${user.user_metadata?.avatar_url
          ? `<img src="${user.user_metadata.avatar_url}" style="width:48px;height:48px;border-radius:50%;object-fit:cover">`
          : `<div style="width:48px;height:48px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:22px">🙂</div>`}
        <div>
          <div style="font-weight:700;font-size:16px">${nickname}</div>
          <div style="color:var(--muted);font-size:13px">${user.email ?? ''}</div>
        </div>
      </div>
      <button id="btn-signout" style="
        width:100%;padding:11px;border-radius:8px;border:1.5px solid var(--line);
        background:var(--card2);cursor:pointer;font-size:14px;color:var(--muted)">
        로그아웃
      </button>
    </div>`

  document.getElementById('btn-signout').addEventListener('click', async () => {
    await signOut()
  })
}

// URL에 auth_error 파라미터 있으면 에러 안내
const params = new URLSearchParams(location.search)
if (params.get('auth_error')) {
  section.innerHTML = `<p style="color:#e53e3e;text-align:center;padding:24px;font-size:14px">로그인 중 오류가 발생했습니다. 다시 시도해주세요.</p>`
  setTimeout(() => renderLogin(), 2000)
}

await initAuth((user, event) => {
  if (user) renderProfile(user)
  else renderLogin()
})
</script>
