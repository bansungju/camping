<main class="wrap">
  <h1 style="margin-top:22px">내 정보</h1>

  <!-- 로그인 / 내 계정 (상단 고정) -->
  <div id="auth-section">
    <div id="auth-loading" style="max-width:360px;margin:16px auto 0;padding:20px 0;display:flex;align-items:center;gap:12px;color:var(--muted);font-size:14px">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--card2);flex-shrink:0"></div>

        <div style="height:14px;background:var(--card2);border-radius:4px;margin-bottom:6px;width:60%"></div>

  <div id="logs-section" style="margin-top:32px;display:none">

      <h2 class="sec" id="sec-logs" style="margin:0">📝 내 로그 <span class="nd" id="logscount"></span></h2>
      <a class="achip clear" href="community.html" style="font-size:12px;padding:5px 10px">+ 새 로그</a>

<footer><div class="wrap">측정값 기반 정직비교 · 로그인하면 찜 목록이 계정에 저장됩니다.</div></footer>

<script src="app.js?v=a3e9c1d2"></script>
<script>
  // 설정 > 다크 모드 토글 (app.js의 window.setTheme 사용)
  (function initThemeSwitch() {
    const sw = document.getElementById('theme-switch');
    if (!sw) return;
    const sync = () => {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      sw.setAttribute('aria-checked', dark ? 'true' : 'false');
    };
    sync();
    sw.addEventListener('click', () => {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (window.setTheme) window.setTheme(dark ? 'light' : 'dark');
      sync();
    });
  })();
</script>
<script type="module">
import {
  initAuth, signInWithOAuth, signOut, getErrorMessage,
  getProfile, isNicknameAvailable, setNickname, NICKNAME_RE,
  loadRemoteWishlist, saveRemoteWishlist, mergeWishlists,
  loadRemoteGearSets, upsertGearSet, deleteRemoteGearSet
} from './supabaseClient.js'

const section = document.getElementById('auth-section')

// 찜 목록은 로그인 여부와 무관하게 즉시 표시(localStorage 기준).
// 로그인 상태에 따라 동기화 안내만 토글한다.
if (typeof renderAccount === 'function') renderAccount()
function setSyncHint(loggedIn) {
  const h = document.getElementById('wish-synchint')
  if (h) h.hidden = loggedIn
}

// 로컬 찜 헬퍼(app.js의 localStorage "wish"와 동일 포맷)
const localWish = {
  get() { try { return JSON.parse(localStorage.getItem('wish') || '[]') } catch { return [] } },
  set(a) { localStorage.setItem('wish', JSON.stringify(a)) }
}

// 로컬 기어세트 헬퍼
const localSets = {
  get() { try { return JSON.parse(localStorage.getItem('gear_sets') || '[]') } catch { return [] } },
  set(a) { localStorage.setItem('gear_sets', JSON.stringify(a)) }
}

// 로그인 직후 1회: 로컬↔원격 기어세트 병합
async function syncGearSetsOnLogin(userId) {
  const remote = await loadRemoteGearSets()
  if (remote === null) return
  const local  = localSets.get()
  // 원격에 없는 로컬 세트 → upsert
  const remoteIds = new Set(remote.map(r => r.id))
  const localLinked = new Set(local.map(s => s.remoteId).filter(Boolean))
  // upsert local-only sets
  const toUpsert = local.filter(s => !s.remoteId)
  for (const s of toUpsert) {
    const id = await upsertGearSet(s, userId)
    if (id) s.remoteId = id
  }
  // merge remote sets not yet in local
  const newFromRemote = remote
    .filter(r => !localLinked.has(r.id))
    .map(r => ({ id: r.id.toString(36) || Date.now().toString(36),
                 remoteId: r.id, title: r.title, style: r.style || '',
                 items: r.items || [], created_at: r.created_at }))
  const merged = [...local, ...newFromRemote]
  localSets.set(merged)
  if (typeof renderAccount === 'function') renderAccount()
}

// 로그인 직후 1회: 로컬↔원격 찜 병합 → 양쪽 저장 → 이후 변경은 onWishChange로 원격 반영
async function syncWishlistOnLogin() {
  const remote = await loadRemoteWishlist()
  if (remote === null) return                 // 네트워크/권한 실패 시 로컬 유지(비파괴)
  const merged = mergeWishlists(localWish.get(), remote)
  localWish.set(merged)
  if (JSON.stringify(merged) !== JSON.stringify(remote)) await saveRemoteWishlist(merged)
  window.onWishChange = (items) => { saveRemoteWishlist(items) }   // app.js setWish가 호출
  if (typeof renderAccount === 'function') renderAccount()        // 병합본으로 다시 그림
}

// 최초 로그인(또는 닉네임 미설정) 시 강제 닉네임 설정 모달. 소셜 실명 노출 차단.
function renderNicknameModal() {
  window.onWishChange = null
  section.innerHTML = `
    <div style="max-width:360px;margin:0 auto;text-align:center;padding:32px 0">
      <div style="font-size:40px;margin-bottom:12px">🌲</div>
      <h2 style="margin:0 0 8px;font-size:19px">닉네임을 정해주세요</h2>
      <p style="color:var(--muted);font-size:13.5px;margin:0 0 20px">커뮤니티·리뷰에 표시될 이름이에요. 실명·이메일은 공개되지 않습니다.</p>
      <input id="nick-input" type="text" maxlength="20" autocomplete="off" placeholder="2~20자 · 한글/영문/숫자/_"
        style="width:100%;padding:12px;border-radius:8px;border:1.5px solid var(--line);font-size:15px;box-sizing:border-box">
      <p id="nick-hint" style="font-size:12.5px;margin:8px 2px 0;text-align:left;min-height:16px;color:var(--muted)"></p>
      <button id="nick-save" disabled style="
        margin-top:14px;width:100%;padding:12px;border-radius:8px;border:none;
        background:var(--brand,#2f7a4e);color:#fff;cursor:pointer;font-size:15px;font-weight:600;opacity:.5">
        시작하기
      </button>
      <button id="nick-signout" type="button" style="
        margin-top:10px;width:100%;padding:9px;border-radius:8px;border:none;
        background:none;cursor:pointer;font-size:13px;color:var(--muted)">
        다른 계정으로 로그인 (로그아웃)
      </button>
    </div>`

  document.getElementById('nick-signout').addEventListener('click', async () => {
    await signOut()
  })

  const input = document.getElementById('nick-input')
  const hint  = document.getElementById('nick-hint')
  const save  = document.getElementById('nick-save')
  let debounce, lastChecked = null

  const setHint = (msg, ok) => { hint.textContent = msg; hint.style.color = ok ? '#2f7a4e' : '#e53e3e' }
  const enable  = (on) => { save.disabled = !on; save.style.opacity = on ? '1' : '.5' }

  input.addEventListener('input', () => {
    const v = input.value.trim()
    enable(false); lastChecked = null
    clearTimeout(debounce)
    if (!v) { hint.textContent = ''; return }
    if (!NICKNAME_RE.test(v)) { setHint('2~20자, 한글/영문/숫자/_ 만 가능해요', false); return }
    setHint('확인 중…', true); hint.style.color = 'var(--muted)'
    debounce = setTimeout(async () => {
      const ok = await isNicknameAvailable(v)
      if (input.value.trim() !== v) return          // 그새 바뀜
      if (ok === null) { setHint('확인 실패 — 그래도 시도해볼 수 있어요', false); enable(true); lastChecked = v }
      else if (ok)     { setHint('사용 가능한 닉네임이에요 ✓', true); enable(true); lastChecked = v }
      else             { setHint('이미 사용 중인 닉네임이에요', false) }
    }, 320)
  })

  save.addEventListener('click', async () => {
    const v = input.value.trim()
    if (!NICKNAME_RE.test(v)) return
    enable(false); save.textContent = '저장 중…'
    const { error } = await setNickname(v)
    if (error) {
      setHint(getErrorMessage(error), false)
      save.textContent = '시작하기'; enable(true)
      return
    }
    const profile = await getProfile()
    renderProfile(profile)
    syncWishlistOnLogin()
  })

  setTimeout(() => input.focus(), 50)
}

function renderLogin() {
  window.onWishChange = null   // 로그아웃 상태에선 원격 동기화 안 함
  section.innerHTML = `
    <div style="max-width:360px;margin:0 auto;text-align:center;padding:32px 0">
      <div style="font-size:48px;margin-bottom:16px">🌲</div>
      <h2 style="margin:0 0 8px;font-size:20px">장비의 숲 로그인</h2>
      <p style="color:var(--muted);font-size:14px;margin:0 0 28px">로그인하면 찜한 상품을 모아 보고 여러 기기에서 동기화할 수 있어요.</p>
      <button id="btn-google" style="
        width:100%;padding:13px;border-radius:8px;border:1.5px solid #e0e0e0;
        background:#fff;cursor:pointer;font-size:15px;font-weight:600;
        display:flex;align-items:center;justify-content:center;gap:10px;
        box-shadow:0 1px 4px rgba(0,0,0,.08)">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.3l7.8 6.1C12.2 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.6A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6L2.5 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.4 0-11.8-3.7-13.6-9.3l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
        Google로 로그인
      </button>
      <p id="auth-error" style="color:#e53e3e;font-size:13px;margin-top:12px;display:none"></p>
    </div>`

  document.getElementById('btn-google').addEventListener('click', async () => {
    const btn = document.getElementById('btn-google')
    btn.disabled = true
    btn.innerHTML = '<span style="font-size:15px">로그인 중…</span>'
    const { error } = await signInWithOAuth('google')
    if (error) {
      document.getElementById('auth-error').textContent = getErrorMessage(error)
      document.getElementById('auth-error').style.display = 'block'
      btn.disabled = false
      btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.3l7.8 6.1C12.2 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.6A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6L2.5 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.4 0-11.8-3.7-13.6-9.3l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg>Google로 로그인`
    }
  })
}

function renderProfile(profile) {
  // 닉네임은 profiles 테이블이 단일 진실. 실명/이메일을 표시명으로 쓰지 않는다.
  const nickname = profile?.nickname ?? '사용자'
  const avatar = profile?.avatar_url
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
  section.innerHTML = `
    <div style="max-width:360px;margin:0 auto;padding:24px 0">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px">
        ${avatar
          ? `<img src="${esc(avatar)}" referrerpolicy="no-referrer" style="width:48px;height:48px;border-radius:50%;object-fit:cover">`
          : `<div style="width:48px;height:48px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:22px">🙂</div>`}
        <div>
          <div style="font-weight:700;font-size:16px">${esc(nickname)}</div>
          <div style="color:var(--muted);font-size:13px">${esc(profile?.email ?? '')}</div>
        </div>
      </div>
      <button id="btn-signout" style="
        width:100%;padding:11px;border-radius:8px;border:1.5px solid var(--line);
        background:var(--card2);cursor:pointer;font-size:14px;color:var(--muted)">
        로그아웃
      </button>
    </div>`

  document.getElementById('btn-signout').addEventListener('click', async () => {
    await signOut()
  })
}

// URL에 auth_error 파라미터 있으면 에러 안내
const params = new URLSearchParams(location.search)
if (params.get('auth_error')) {
  section.innerHTML = `<p style="color:#e53e3e;text-align:center;padding:24px;font-size:14px">로그인 중 오류가 발생했습니다. 다시 시도해주세요.</p>`
  setTimeout(() => renderLogin(), 2000)
}

await initAuth(async (user, event) => {
  window._accUser = user || null
  if (!user) {
    setSyncHint(false)
    renderLogin()
    if (typeof renderAccount === 'function') renderAccount()
    return
  }
  // 로그인됨 — profiles에서 닉네임 확인
  const profile = await getProfile()
  if (!profile || !profile.nickname) {
    // 최초 로그인(또는 닉네임 미설정): 닉네임부터 강제(찜 목록은 계속 표시)
    setSyncHint(true)
    renderNicknameModal()
    if (typeof renderAccount === 'function') renderAccount()
    return
  }
  setSyncHint(true)
  renderAccount()
  renderProfile(profile)
  if (typeof renderAccount === 'function') renderAccount()
  if (event === 'SIGNED_IN') {
    syncWishlistOnLogin()
    syncGearSetsOnLogin(user.id)
  } else {
    window.onWishChange = (items) => { saveRemoteWishlist(items) }
  }
  // expose for app.js delete handler
  window._deleteRemoteGearSet = (remoteId) => deleteRemoteGearSet(remoteId)
})
</script>
