<script>
  // L-63: 스크린리더 알림 헬퍼 — app.js와 account.html 양쪽에서 호출 가능
  window.accAnnounce = function(msg) {
    const el = document.getElementById('acc-sr-live');
    if (!el) return;
    el.textContent = '';
    setTimeout(() => { el.textContent = msg; }, 50);
  };

  // L-37: 찜 전체 삭제 버튼
  document.getElementById('wish-clear-all')?.addEventListener('click', () => {
    const count = typeof getWish === 'function' ? getWish().length : 0;
    if (!count) return;
    if (!confirm(`찜한 상품 ${count}개를 모두 해제할까요?`)) return;
    if (typeof setWish === 'function') setWish([]);
    if (typeof renderAccount === 'function') renderAccount();
    window.accAnnounce?.('찜한 상품 전체 해제됐어요');
  });

  // M-85: PWA 설치 버튼 — beforeinstallprompt 캡처 및 핸들러
  (function initPwaInstall() {
    let deferredPrompt = null;
    const row = document.getElementById('pwa-install-row');
    const btn = document.getElementById('pwa-install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (row) row.style.display = '';
    });
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      if (row) row.style.display = 'none';
    });
    if (btn) {
      btn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (row) row.style.display = 'none';
      });
    }
  })();

  // 설정 > 다크 모드 토글 (app.js의 window.setTheme 사용)
  (function initThemeSwitch() {
    const sw = document.getElementById('theme-switch');
    if (!sw) return;
    const sync = () => {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      sw.setAttribute('aria-checked', dark ? 'true' : 'false');
    };
    sync();
    sw.addEventListener('click', () => {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (window.setTheme) window.setTheme(dark ? 'light' : 'dark');
      sync();
    });
  })();
</script>
<script type="module">
import {
  initAuth, signInWithOAuth, signOut, deleteAccount, getErrorMessage,
  getProfile, isNicknameAvailable, setNickname, NICKNAME_RE,
  loadRemoteWishlist, saveRemoteWishlist, mergeWishlists,
  loadRemoteGearSets, upsertGearSet, deleteRemoteGearSet
} from './supabaseClient.js?v=3f90c643'

const section = document.getElementById('auth-section')
// L-76: 세트 공유 URL 열람 중에는 배경 개인 데이터 표시 억제
const _isViewSet = !!new URLSearchParams(location.search).get('view-set')

// 찜 목록은 로그인 여부와 무관하게 즉시 표시(localStorage 기준).
// 로그인 상태에 따라 동기화 안내만 토글한다.
if (!_isViewSet && typeof renderAccount === 'function') renderAccount()
function setSyncHint(loggedIn) {
  const h = document.getElementById('wish-synchint')
  if (!h) return
  const wishCount = (() => { try { return JSON.parse(localStorage.getItem('wish') || '[]').length } catch { return 0 } })()
  // 비로그인 + 찜 1개 이상일 때만 표시 (0개면 wish-empty의 CTA가 커버)
  h.hidden = loggedIn || wishCount === 0
}

// 로컬 찜 헬퍼(app.js의 localStorage "wish"와 동일 포맷)
const localWish = {
  get() { try { return JSON.parse(localStorage.getItem('wish') || '[]') } catch { return [] } },
  set(a) { localStorage.setItem('wish', JSON.stringify(a)) }
}

// 로컬 기어세트 헬퍼
const localSets = {
  get() { try { return JSON.parse(localStorage.getItem('gear_sets') || '[]') } catch { return [] } },
  set(a) { localStorage.setItem('gear_sets', JSON.stringify(a)) }
}

// 로그인 직후 1회: 로컬↔원격 기어세트 병합
async function syncGearSetsOnLogin(userId) {
  const remote = await loadRemoteGearSets()
  if (remote === null) return
  const local  = localSets.get()
  // 원격에 없는 로컬 세트 → upsert
  const localLinked = new Set(local.map(s => s.remoteId).filter(Boolean))
  // upsert local-only sets
  const toUpsert = local.filter(s => !s.remoteId)
  for (const s of toUpsert) {
    const id = await upsertGearSet(s, userId)
    if (id) s.remoteId = id
  }
  // merge remote sets not yet in local
  const newFromRemote = remote
    .filter(r => !localLinked.has(r.id))
    .map(r => ({ id: (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2),
                 remoteId: r.id, title: r.title, style: r.style || '',
                 items: r.items || [], created_at: r.created_at }))
  const merged = [...local, ...newFromRemote]
  localSets.set(merged)
  if (typeof renderAccount === 'function') renderAccount()
}

// 로그인 직후 1회: 로컬↔원격 찜 병합 → 양쪽 저장 → 이후 변경은 onWishChange로 원격 반영
async function syncWishlistOnLogin() {
  window.onWishChange = (items) => { saveRemoteWishlist(items) }   // app.js setWish가 호출
  const remote = await loadRemoteWishlist()
  if (remote === null) return                 // 네트워크/권한 실패 시 로컬 유지(비파괴)
  const merged = mergeWishlists(localWish.get(), remote)
  localWish.set(merged)
  if (JSON.stringify(merged) !== JSON.stringify(remote)) await saveRemoteWishlist(merged)
  if (typeof renderAccount === 'function') renderAccount()        // 병합본으로 다시 그림
}

// 최초 로그인(또는 닉네임 미설정) 시 강제 닉네임 설정 모달. 소셜 실명 노출 차단.
function renderNicknameModal() {
  window.onWishChange = null
  showLoggedInSections(true)
  section.innerHTML = `
    <div style="max-width:360px;margin:0 auto;text-align:center;padding:32px 0">
      <div style="font-size:40px;margin-bottom:12px">🌲</div>
      <h2 style="margin:0 0 8px;font-size:19px">닉네임을 정해주세요</h2>
      <p style="color:var(--muted);font-size:13.5px;margin:0 0 20px">커뮤니티·리뷰에 표시될 이름이에요. 실명·이메일은 공개되지 않습니다.</p>
      <input id="nick-input" type="text" maxlength="20" autocomplete="off" placeholder="2~20자 · 한글/영문/숫자/_"
        style="width:100%;padding:12px;border-radius:8px;border:1.5px solid var(--line);font-size:15px;box-sizing:border-box">
      <p id="nick-hint" aria-live="polite" aria-atomic="true" style="font-size:12.5px;margin:8px 2px 0;text-align:left;min-height:16px;color:var(--muted)"></p>
      <button id="nick-save" disabled style="
        margin-top:14px;width:100%;padding:12px;border-radius:8px;border:none;
        background:var(--brand,#2f7a4e);color:#fff;cursor:pointer;font-size:15px;font-weight:600;opacity:.5">
        시작하기
      </button>
      <button id="nick-signout" type="button" style="
        margin-top:10px;width:100%;padding:9px;border-radius:8px;border:none;
        background:none;cursor:pointer;font-size:13px;color:var(--muted)">
        다른 계정으로 로그인 (로그아웃)
      </button>
    </div>`

  document.getElementById('nick-signout').addEventListener('click', async () => {
    await signOut()
  })

  const input = document.getElementById('nick-input')
  const hint  = document.getElementById('nick-hint')
  const save  = document.getElementById('nick-save')
  let debounce, lastChecked = null

  const setHint = (msg, ok) => { hint.textContent = msg; hint.style.color = ok ? '#2f7a4e' : '#e53e3e' }
  const enable  = (on) => { save.disabled = !on; save.style.opacity = on ? '1' : '.5' }

  input.addEventListener('input', () => {
    const v = input.value.trim()
    enable(false); lastChecked = null
    clearTimeout(debounce)
    if (!v) { hint.textContent = ''; return }
    if (!NICKNAME_RE.test(v)) { setHint('2~20자, 한글/영문/숫자/_ 만 가능해요', false); return }
    setHint('확인 중…', true); hint.style.color = 'var(--muted)'
    debounce = setTimeout(async () => {
      const ok = await isNicknameAvailable(v)
      if (input.value.trim() !== v) return          // 그새 바뀜
      if (ok === null) { setHint('확인 실패 — 그래도 시도해볼 수 있어요', false); enable(true); lastChecked = v }
      else if (ok)     { setHint('사용 가능한 닉네임이에요 ✓', true); enable(true); lastChecked = v }
      else             { setHint('이미 사용 중인 닉네임이에요', false) }
    }, 320)
  })

  save.addEventListener('click', async () => {
    const v = input.value.trim()
    if (!NICKNAME_RE.test(v)) return
    clearTimeout(debounce)
    enable(false); save.textContent = '저장 중…'
    const { error } = await setNickname(v)
    if (error) {
      setHint(getErrorMessage(error), false)
      save.textContent = '시작하기'; enable(true)
      return
    }
    const profile = await getProfile()
    renderProfile(profile)
    syncWishlistOnLogin()
    // M-123/L-150: 닉네임 설정 완료 후 세트 동기화
    if (profile?.id) syncGearSetsOnLogin(profile.id)
  })

  setTimeout(() => input.focus(), 50)
}

// M-52: URL 해시 → 섹션 스크롤. wish/sets/logs/settings 해시 지원.
const HASH_SEC = { '#wish':'wish-section', '#sets':'sets-section', '#logs':'logs-section', '#settings':'settings-section', '#settings-section':'settings-section' }
function scrollToHashSection() {
  const h = location.hash.toLowerCase()
  const id = HASH_SEC[h]
  if (!id) return
  const el = document.getElementById(id)
  if (!el || el.style.display === 'none') return
  setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 120)
}
window.addEventListener('hashchange', scrollToHashSection)

function showLoggedInSections(show) {
  if (show && _isViewSet) return  // L-76: 공유 URL 열람 중 개인 섹션 억제
  const ws = document.getElementById('wish-section')
  const ss = document.getElementById('settings-section')
  const ba = document.getElementById('bottom-actions')
  if (ws) ws.style.display = show ? '' : 'none'
  if (ss) ss.style.display = show ? '' : 'none'
  if (ba) ba.style.display = show ? '' : 'none'
  // L-98/M-30: 로그아웃 시 sets/logs 섹션도 즉시 숨김 (renderAccount 재호출 없이)
  if (!show) {
    const sets = document.getElementById('sets-section')
    const logs = document.getElementById('logs-section')
    if (sets) sets.style.display = 'none'
    if (logs) logs.style.display = 'none'
  }
}

function renderLogin() {
  window.onWishChange = null   // 로그아웃 상태에선 원격 동기화 안 함
  showLoggedInSections(false)
  section.innerHTML = `
    <div style="max-width:360px;margin:0 auto;text-align:center;padding:32px 0">
      <div style="font-size:48px;margin-bottom:16px">🌲</div>
      <h2 style="margin:0 0 8px;font-size:20px">장비의 숲 로그인</h2>
      <p style="color:var(--muted);font-size:14px;margin:0 0 28px">로그인하면 찜한 상품을 모아 보고 여러 기기에서 동기화할 수 있어요.</p>
      <button id="btn-google" type="button" style="
        width:100%;padding:13px;border-radius:8px;border:1.5px solid #e0e0e0;
        background:#fff;cursor:pointer;font-size:15px;font-weight:600;
        display:flex;align-items:center;justify-content:center;gap:10px;
        box-shadow:0 1px 4px rgba(0,0,0,.08)">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.3l7.8 6.1C12.2 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.6A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6L2.5 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.4 0-11.8-3.7-13.6-9.3l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
        Google로 로그인
      </button>
      <p id="auth-error" style="color:#e53e3e;font-size:13px;margin-top:12px;display:none"></p>
    </div>`

  document.getElementById('btn-google').addEventListener('click', async () => {
    const btn = document.getElementById('btn-google')
    btn.disabled = true
    btn.innerHTML = '<span style="font-size:15px">로그인 중…</span>'
    // L-64: OAuth 후 hash 복원 — redirect_uri에 hash 포함 불가이므로 sessionStorage에 보존
    if (location.hash && location.hash !== '#') sessionStorage.setItem('acc-return-hash', location.hash)
    const { error } = await signInWithOAuth('google')
    if (error) {
      document.getElementById('auth-error').textContent = getErrorMessage(error)
      document.getElementById('auth-error').style.display = 'block'
      btn.disabled = false
      btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.3l7.8 6.1C12.2 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.6A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6L2.5 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.4 0-11.8-3.7-13.6-9.3l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg>Google로 로그인`
    }
  })
}

function renderProfile(profile) {
  showLoggedInSections(true)
  // 닉네임은 profiles 테이블이 단일 진실. 실명/이메일을 표시명으로 쓰지 않는다.
  const nickname = profile?.nickname ?? '사용자'
  const avatar = profile?.avatar_url
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
  // FE-SOC-06: KREAM식 좌측정렬·컴팩트 헤더(가운데 띄움 제거). 닉네임은 profiles 단일 진실(↔ FE-SOC-04).
  section.innerHTML = `
    <div style="padding:20px 0 8px">
      <div style="display:flex;align-items:center;gap:14px">
        ${avatar
          ? `<img src="${esc(avatar)}" referrerpolicy="no-referrer" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0">`
          : `<div style="width:48px;height:48px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🙂</div>`}
        <div style="min-width:0">
          <div style="font-weight:700;font-size:17px">${esc(nickname)}</div>
          <div style="color:var(--muted);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Google 로그인</div>
        </div>
      </div>
    </div>`

  // L-20: 닉네임 설정 행 갱신
  const nickRow = document.getElementById('nick-settings-row')
  const nickCurr = document.getElementById('nick-settings-current')
  if (nickRow) nickRow.style.display = ''
  if (nickCurr) nickCurr.textContent = nickname
  window._accNickname = nickname

  // 최하단 버튼 이벤트 연결 (bottom-actions는 showLoggedInSections로 표시됨)
  const btnSignout = document.getElementById('btn-signout')
  const btnDelete  = document.getElementById('btn-delete-account')
  const deleteHint = document.getElementById('delete-hint')

  if (btnSignout) {
    btnSignout.onclick = async () => { await signOut() }
  }

  if (btnDelete) {
    btnDelete.onclick = async () => {
      if (!confirm('정말 계정을 삭제하시겠어요?\n\n· 프로필·찜·세트가 삭제됩니다\n· 작성한 글은 작성자 표시 없이 남습니다\n· 30일간 재가입할 수 없습니다')) return
      if (!confirm('이 작업은 되돌릴 수 없습니다. 계속할까요?')) return
      btnDelete.disabled = true; btnDelete.textContent = '삭제 중…'; btnDelete.style.opacity = '.4'
      const { error } = await deleteAccount()
      if (error) {
        if (deleteHint) { deleteHint.textContent = getErrorMessage(error) || '삭제에 실패했습니다.'; deleteHint.style.display = '' }
        btnDelete.disabled = false; btnDelete.textContent = '계정 삭제'; btnDelete.style.opacity = '.55'
        return
      }
      await signOut()
      localStorage.removeItem('wish'); localStorage.removeItem('gear_sets')
      location.replace('index.html?account_deleted=1')
    }
  }
}

// L-20: 닉네임 변경 인라인 폼 핸들러
;(function initNickChange() {
  const btn    = document.getElementById('nick-settings-btn')
  const form   = document.getElementById('nick-change-form')
  const input  = document.getElementById('nick-change-input')
  const hint   = document.getElementById('nick-change-hint')
  const save   = document.getElementById('nick-change-save')
  const cancel = document.getElementById('nick-change-cancel')
  if (!btn || !form) return

  const setH = (msg, ok) => { hint.textContent = msg; hint.style.color = ok ? '#2f7a4e' : '#e53e3e' }
  const setOk = (on) => { save.disabled = !on; save.style.opacity = on ? '1' : '.5' }

  btn.addEventListener('click', () => {
    form.style.display = ''; input.value = ''; hint.textContent = ''; setOk(false)
    setTimeout(() => input.focus(), 30)
  })
  cancel.addEventListener('click', () => { form.style.display = 'none' })

  let debounce, lastChecked = null
  input.addEventListener('input', () => {
    const v = input.value.trim()
    setOk(false); lastChecked = null; clearTimeout(debounce)
    if (!v) { hint.textContent = ''; return }
    if (!NICKNAME_RE.test(v)) { setH('2~20자, 한글/영문/숫자/_ 만 가능해요', false); return }
    if (v === window._accNickname) { setH('현재 닉네임과 같아요', false); return }
    setH('확인 중…', true); hint.style.color = 'var(--muted)'
    debounce = setTimeout(async () => {
      const ok = await isNicknameAvailable(v)
      if (input.value.trim() !== v) return
      if (ok === null) { setH('확인 실패 — 그래도 시도할 수 있어요', false); setOk(true); lastChecked = v }
      else if (ok)     { setH('사용 가능한 닉네임이에요 ✓', true); setOk(true); lastChecked = v }
      else             { setH('이미 사용 중인 닉네임이에요', false) }
    }, 320)
  })

  save.addEventListener('click', async () => {
    const v = input.value.trim()
    if (!NICKNAME_RE.test(v)) return
    clearTimeout(debounce); setOk(false); save.textContent = '저장 중…'
    const { error } = await setNickname(v)
    if (error) {
      setH(getErrorMessage(error), false); save.textContent = '저장'; setOk(true)
      return
    }
    window._accNickname = v
    const nickCurr = document.getElementById('nick-settings-current')
    if (nickCurr) nickCurr.textContent = v
    // 프로필 헤더 닉네임도 즉시 갱신
    const profileName = document.querySelector('#auth-section [style*="font-weight:700"]')
    if (profileName) profileName.textContent = v
    form.style.display = 'none'; save.textContent = '저장'
    window.accAnnounce?.('닉네임이 변경됐어요')
  })
})()

// URL에 auth_error 파라미터 있으면 에러 안내
const params = new URLSearchParams(location.search)
const authErrorParam = params.get('auth_error')
let authErrorTimer = null
if (authErrorParam) {
  const errDetail = params.get('err') || ''
  if (errDetail) console.error('[auth] exchangeCodeForSession 실패:', decodeURIComponent(errDetail))
  section.innerHTML = `<p style="color:#e53e3e;text-align:center;padding:24px;font-size:14px">로그인 중 오류가 발생했습니다. 다시 시도해주세요.</p>`
  // 유효한 세션이 이미 있으면(닉네임 모달 등) 이 타이머를 취소해 화면을 덮어쓰지 않도록 함.
  authErrorTimer = setTimeout(() => renderLogin(), 2000)
}

let _authFired = false
const _authTimeout = setTimeout(() => { if (!_authFired) renderLogin() }, 3000)

await initAuth(async (user, event) => {
  _authFired = true
  clearTimeout(_authTimeout)
  window._accUser = user || null
  if (user && authErrorTimer) { clearTimeout(authErrorTimer); authErrorTimer = null }
  if (!user) {
    setSyncHint(false)
    // auth_error 표시 중엔 initAuth가 에러 메시지를 덮어쓰지 않도록 보호(M-96).
    // 2초 setTimeout이 renderLogin()을 호출하므로 여기선 건너뜀.
    if (!authErrorParam) renderLogin()
    if (typeof renderAccount === 'function') renderAccount()
    return
  }
  // 로그인됨 — profiles에서 닉네임 확인
  const profile = await getProfile()
  if (!profile || !profile.nickname) {
    // 최초 로그인(또는 닉네임 미설정): 닉네임부터 강제(찜 목록은 계속 표시)
    setSyncHint(true)
    renderNicknameModal()
    if (typeof renderAccount === 'function') renderAccount()
    return
  }
  setSyncHint(true)
  // M-117: 재로그인 시 내 로그 stale 방지 — 이전 세션 loaded 플래그 초기화
  if (event === 'SIGNED_IN') {
    const ml = document.getElementById('my-logs-list')
    if (ml) { delete ml.dataset.loaded; delete ml.dataset.logLoginShown; }
  }
  renderAccount()
  renderProfile(profile)
  scrollToHashSection()
  if (event === 'SIGNED_IN') {
    syncWishlistOnLogin()
    syncGearSetsOnLogin(user.id)
  } else {
    window.onWishChange = (items) => { saveRemoteWishlist(items) }
  }
  // expose for app.js delete handler
  window._deleteRemoteGearSet = (remoteId) => deleteRemoteGearSet(remoteId)
})
</script>
