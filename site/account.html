<body>
<header class="top"><div class="wrap">
  <a class="logo" href="index.html">장비의 <b>숲</b></a>
  <div class="sub">정량 스펙 별점 · 브랜드만 · 측정값만</div>
</div></header>

<main class="wrap">
  <h1 style="margin-top:22px">내 정보</h1>

  <!-- 찜한 상품(로그인 없이 이 기기에 저장) -->
  <h2 class="sec">❤️ 찜한 상품 <span class="nd" id="wishcount"></span></h2>
  <div id="wishlist" class="plist"></div>

  <!-- 로그인 준비중 -->
  <div class="coming" style="margin-top:34px">
    <div class="ce">👤</div>
    <h1>로그인</h1>
    <p>로그인·회원가입 기능을 준비하고 있어요.</p>
    <span class="cbadge">준비중 · 미리보기</span>
    <form class="cform" onsubmit="return false">
      <div>
        <label for="email">이메일</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="off" disabled>
      </div>
      <div>
        <label for="pw">비밀번호</label>
        <input id="pw" type="password" placeholder="••••••••" autocomplete="off" disabled>
      </div>
      <button class="cbtn" type="submit" disabled>로그인 (준비중)</button>
    </form>
    <div class="cfoot">로그인하면 찜 목록을 여러 기기에서 동기화할 수 있게 준비 중이에요. 지금은 이 기기에만 저장돼요.</div>
  </div>
</main>

<footer><div class="wrap">측정값 기반 정직비교 · 찜은 이 기기에 저장 · 계정 기능 준비중.</div></footer>
