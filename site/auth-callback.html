<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>로그인 처리 중 — 장비의 숲</title>
<script>
  (function(){try{var t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark')}catch(e){}})()
</script>
<style>
  html[data-theme="dark"] body { background: #1a1a1a; }
  body { margin: 0; background: #fff; font-family: system-ui, sans-serif;
         display: flex; align-items: center; justify-content: center; height: 100vh; }
  .msg { text-align: center; color: #6c757d; font-size: 14px; }
  html[data-theme="dark"] .msg { color: #aaa; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e9ecef;
             border-top-color: #0070f3; border-radius: 50%;
             animation: spin .7s linear infinite; margin: 0 auto 16px; }
  html[data-theme="dark"] .spinner { border-color: #333; border-top-color: #4ea8de; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  <p>로그인 처리 중입니다…</p>
</div>
<script type="module">
  import { supabase } from './supabaseClient.js?v=adfb0f1f'

  // L-64: OAuth 전 저장된 hash 복원
  const _retHash = sessionStorage.getItem('acc-return-hash') || ''
  const _accUrl = (base) => _retHash ? base + _retHash : base
  if (_retHash) sessionStorage.removeItem('acc-return-hash')

  const params = new URLSearchParams(location.search)
  // OAuth 오류 리다이렉트 처리 (?error=access_denied 등)
  const oauthError = params.get('error')
  if (oauthError) {
    const desc = encodeURIComponent(params.get('error_description') || oauthError)
    location.replace(`./account.html?auth_error=1&err=${desc}`)
  }
  // PKCE flow: ?code= 파라미터로 오는 경우 세션 교환
  const code = params.get('code')
  if (!oauthError && code) {
    const { error } = await supabase.auth.exchangeCodeForSession(code)
    if (error) {
      const msg = encodeURIComponent(error.message || error.status || 'unknown')
      location.replace(`./account.html?auth_error=1&err=${msg}`)
    } else {
      location.replace(_accUrl('./account.html'))
    }
  } else if (!oauthError) {
    // Implicit flow / hash fragment — onAuthStateChange로 세션 대기
    // INITIAL_SESSION(null)은 클라이언트 초기화 시 항상 발화하므로 무시.
    // SIGNED_IN 이벤트(실제 세션 생성)까지만 대기 후 이동.
    let settled = false
    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'INITIAL_SESSION' && !session) return  // skip empty init event
      if (settled) return
      settled = true
      subscription.unsubscribe()
      if (session) { location.replace(_accUrl('./account.html')); }
      else         { location.replace('./account.html?auth_error=1'); }
    })
    // L-138: settled 가드 — onAuthStateChange가 먼저 발화한 경우 이중 replace 방지
    const { data: { session } } = await supabase.auth.getSession()
    if (!settled && session) { settled = true; subscription.unsubscribe(); location.replace(_accUrl('./account.html')); }
    // 15초 timeout — 세션 이벤트 미발화 시 auth_error 처리
    setTimeout(() => {
      if (!settled) { settled = true; subscription.unsubscribe(); location.replace('./account.html?auth_error=1'); }
    }, 15000)
  }
</script>
</body>
</html>
