<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>로그인 처리 중 — 장비의 숲</title>
<style>
  body { margin: 0; background: #fff; font-family: system-ui, sans-serif;
         display: flex; align-items: center; justify-content: center; height: 100vh; }
  .msg { text-align: center; color: #6c757d; font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e9ecef;
             border-top-color: #0070f3; border-radius: 50%;
             animation: spin .7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  <p>로그인 처리 중입니다…</p>
</div>
<script type="module">
  import { supabase } from './supabaseClient.js?v=459d55e9'

  // PKCE flow: ?code= 파라미터로 오는 경우 세션 교환
  const params = new URLSearchParams(location.search)
  const code = params.get('code')
  if (code) {
    const { error } = await supabase.auth.exchangeCodeForSession(code)
    if (error) {
      const msg = encodeURIComponent(error.message || error.status || 'unknown')
      location.replace(`./account.html?auth_error=1&err=${msg}`)
    } else {
      location.replace('./account.html')
    }
  } else {
    // Implicit flow / hash fragment — onAuthStateChange로 세션 대기
    // INITIAL_SESSION(null)은 클라이언트 초기화 시 항상 발화하므로 무시.
    // SIGNED_IN 이벤트(실제 세션 생성)까지만 대기 후 이동.
    let settled = false
    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'INITIAL_SESSION' && !session) return  // skip empty init event
      if (settled) return
      settled = true
      subscription.unsubscribe()
      if (session) { location.replace('./account.html'); }
      else         { location.replace('./account.html?auth_error=1'); }
    })
    // 이미 세션이 있으면 바로 이동
    const { data: { session } } = await supabase.auth.getSession()
    if (session) { settled = true; subscription.unsubscribe(); location.replace('./account.html'); }
    // 15초 timeout — 세션 이벤트 미발화 시 auth_error 처리
    setTimeout(() => {
      if (!settled) { settled = true; subscription.unsubscribe(); location.replace('./account.html?auth_error=1'); }
    }, 15000)
  }
</script>
</body>
</html>
