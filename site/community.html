<style>
  /* 커뮤니티 준비중 안내 */
  .cm-soon{text-align:center;color:var(--muted);padding:64px 16px 80px;max-width:520px;margin:0 auto}
  .cm-soon .e{font-size:54px;display:block;margin-bottom:16px}
  .cm-soon h1{font-size:22px;font-weight:800;color:var(--txt);margin:0 0 12px}
  .cm-soon p{font-size:14.5px;line-height:1.7;margin:0 0 24px}
  .cm-soon .cm-home{display:inline-block;padding:11px 20px;border-radius:9px;background:var(--accent);
    color:#fff;font-size:14px;font-weight:600;text-decoration:none}
  /* 커뮤니티 전용 — HTML은 네트워크 우선이라 항상 최신 */
  .cm-bar{display:flex;align-items:center;gap:10px;margin:22px 0 8px}
  .cm-bar h1{margin:0;font-size:22px;flex:1}
  .cm-btn{padding:9px 16px;border-radius:9px;border:none;background:var(--accent);color:#fff;
    font-size:14px;font-weight:600;cursor:pointer}
  .cm-btn:disabled{opacity:.5;cursor:default}
  .cm-btn.ghost{background:none;color:var(--muted);border:1px solid var(--line)}
  .cm-loginhint{color:var(--muted);font-size:13px;margin:0 0 16px}
  .cm-loginhint a{color:var(--accent);font-weight:600}
  .cm-feed{display:flex;flex-direction:column;gap:12px;margin:14px 0 30px}
  .cm-post{display:block;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:15px 16px;box-shadow:var(--shadow);cursor:pointer}
  .cm-post:hover{box-shadow:var(--shadow-h)}
  .cm-meta{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;margin-bottom:6px}
  .cm-ava{width:22px;height:22px;border-radius:50%;object-fit:cover;background:var(--card2);
    display:inline-flex;align-items:center;justify-content:center;font-size:13px}
  .cm-title{font-size:16px;font-weight:700;margin:0 0 4px;color:var(--txt)}
  .cm-snippet{color:var(--muted);font-size:13.5px;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .cm-thumbs{display:flex;gap:6px;margin-top:10px}
  .cm-thumbs img{width:64px;height:64px;object-fit:cover;border-radius:8px;background:var(--card2)}
  .cm-stat{display:flex;gap:14px;color:var(--muted);font-size:12.5px;margin-top:10px}
  .cm-empty{text-align:center;color:var(--muted);padding:48px 0;font-size:14px}
  .cm-empty .e{font-size:40px;display:block;margin-bottom:12px}
  /* 작성 폼 */
  .cm-form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0 30px}
  .cm-form label{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px;font-weight:600}
  .cm-form label:first-child{margin-top:0}
  .cm-form input[type=text],.cm-form textarea{width:100%;padding:11px;border-radius:9px;
    border:1.5px solid var(--line);font-size:15px;font-family:inherit;background:var(--bg);color:var(--txt)}
  .cm-form textarea{min-height:160px;resize:vertical;line-height:1.6}
  .cm-form .cm-count{font-size:12px;color:var(--faint);text-align:right;margin-top:4px}
  .cm-up{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;align-items:center}
  .cm-up .prev{position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;background:var(--card2)}
  .cm-up .prev img{width:100%;height:100%;object-fit:cover}
  .cm-up .prev button{position:absolute;top:2px;right:2px;width:20px;height:20px;border:none;border-radius:50%;
    background:rgba(0,0,0,.6);color:#fff;font-size:12px;cursor:pointer;line-height:1}
  .cm-up .addimg{width:72px;height:72px;border-radius:9px;border:1.5px dashed var(--line);background:var(--card2);
    color:var(--muted);font-size:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .cm-actions{display:flex;gap:10px;margin-top:20px}
  .cm-actions .cm-btn{flex:1;padding:12px}
  .cm-err{color:#e53e3e;font-size:13px;margin-top:12px;min-height:16px}
  /* 상세 */
  .cm-back{color:var(--muted);font-size:13.5px;cursor:pointer;display:inline-block;margin:18px 0 8px}
  .cm-detail h1{font-size:21px;margin:6px 0 10px;line-height:1.35}
  .cm-body{font-size:15px;line-height:1.7;white-space:pre-wrap;word-break:break-word;margin:14px 0}
  .cm-imgs{display:flex;flex-direction:column;gap:10px;margin:16px 0}
  .cm-imgs img{width:100%;border-radius:12px;background:var(--card2)}
  .cm-toolbar{display:flex;align-items:center;gap:8px;border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);padding:12px 0;margin:18px 0}
  .cm-like{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;
    border:1px solid var(--line);background:var(--bg);cursor:pointer;font-size:14px;color:var(--muted)}
  .cm-like.on{color:#e0245e;border-color:#f3b6c6;background:#fff5f8}
  .cm-report{margin-left:auto;color:var(--faint);font-size:12.5px;cursor:pointer;background:none;border:none}
  .cm-del{color:var(--faint);font-size:12.5px;cursor:pointer;background:none;border:none}
  .cm-cmts{margin:18px 0 40px}
  .cm-cmt{padding:12px 0;border-bottom:1px solid var(--line)}
  .cm-cmt .cm-meta{margin-bottom:4px}
  .cm-cmt .t{font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .cm-cform{display:flex;gap:8px;margin:14px 0}
  .cm-cform textarea{flex:1;padding:10px;border-radius:9px;border:1.5px solid var(--line);
    font-size:14px;font-family:inherit;min-height:44px;resize:vertical;background:var(--bg);color:var(--txt)}
  .cm-spin{text-align:center;color:var(--muted);padding:40px 0;font-size:14px}
</style>
