<body>
<header class="top"><div class="wrap">
  <a class="logo" href="index.html">장비의 <b>숲</b></a>
  <div class="sub">정량 스펙 별점 · 브랜드만 · 측정값만</div>
</div></header>

<main class="wrap">
  <div style="display:flex;align-items:baseline;justify-content:space-between;margin-top:20px;margin-bottom:4px">
    <h1>커뮤니티</h1>
    <button id="comm-write-btn" class="comm-write-btn" type="button">✏ 로그 쓰기</button>
  </div>
  <p style="font-size:13px;color:var(--muted);margin-bottom:16px">캠핑 로그를 남기고 장비를 태그해보세요</p>

  <!-- 탭 -->
  <div class="comm-tabs" id="comm-tabs">
    <button class="comm-tab on" data-tab="best">🏆 베스트 장비</button>
    <button class="comm-tab" data-tab="logs">📝 캠핑 로그</button>
  </div>

  <!-- 베스트 장비 탭 -->
  <div id="comm-best" class="comm-panel">
    <div id="comm-best-list"></div>
  </div>

  <!-- 로그 탭 -->
  <div id="comm-logs" class="comm-panel" style="display:none">
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="log-sort-btn on" data-sort="latest" type="button">최신순</button>
      <button class="log-sort-btn" data-sort="popular" type="button">인기순</button>
    </div>
    <div id="comm-logs-list"></div>
  </div>
</main>

<!-- 로그 작성 모달 -->
<div id="log-modal" class="pmodal">
  <div class="pmbox log-modal-box" role="dialog" aria-modal="true">
    <button class="pmx" aria-label="닫기">✕</button>
    <h2 style="font-size:17px;font-weight:700;margin-bottom:16px">캠핑 로그 작성</h2>
    <div id="log-modal-body"></div>
  </div>
</div>

<footer><div class="wrap">측정값 기반 정직비교 · 캠핑 로그로 나만의 장비 데이터를 쌓아보세요.</div></footer>

<script src="app.js?v=ada1470d"></script>
<script type="module">
import { initAuth } from './supabaseClient.js'
window._commUser = null;
initAuth(async (user) => { window._commUser = user; })
</script>
</body>
