<script src="app.js?v=e246e1af"></script>
<script type="module">
import {
  initAuth, getProfile, getErrorMessage,
  listPosts, getPost, createPost, deletePost,
  listComments, createComment, getMyLikes, toggleLike,
  reportContent, uploadImage
} from './supabaseClient.js?v=adfb0f1f'

const root = document.getElementById('cm-root')
let me = null            // { user, profile } 또는 null
let myProfileNick = null // 닉네임(참여 가능 여부)

// app.js의 esc가 전역. 없으면 폴백.
const esc = window.esc || (s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])))

function timeAgo(iso) {
  if (!iso) return ''
  const d = (Date.now() - new Date(iso).getTime()) / 1000
  if (d < 60) return '방금'
  if (d < 3600) return `${Math.floor(d/60)}분 전`
  if (d < 86400) return `${Math.floor(d/3600)}시간 전`
  if (d < 2592000) return `${Math.floor(d/86400)}일 전`
  return new Date(iso).toLocaleDateString('ko-KR')
}

function authorBlock(author, iso) {
  const nick = author?.nickname ?? '탈퇴한 사용자'
  const av = author?.avatar_url
  const avatar = av
    ? `<img class="cm-ava" src="${esc(av)}" referrerpolicy="no-referrer" alt="">`
    : `<span class="cm-ava">🙂</span>`
  return `<div class="cm-meta">${avatar}<span>${esc(nick)}</span><span>·</span><span>${timeAgo(iso)}</span></div>`
}

function canParticipate() { return !!(me && myProfileNick) }

function loginHint(action) {
  return `<p class="cm-loginhint"><a href="account.html">로그인</a>하고 ${action} 참여해 보세요. (닉네임 설정 후 가능)</p>`
}

// ── 피드 ───────────────────────────────────────────────────────────────
async function renderFeed() {
  root.innerHTML = `
    <div class="cm-bar">
      <h1>커뮤니티</h1>
      ${canParticipate()
        ? `<button class="cm-btn" id="cm-write">✍️ 글쓰기</button>`
        : ``}
    </div>
    ${canParticipate() ? `` : loginHint('사용기·질문·꿀팁에')}
    <div class="cm-feed" id="cm-list"><div class="cm-spin">불러오는 중…</div></div>`

  const wb = document.getElementById('cm-write')
  if (wb) wb.onclick = () => { location.hash = '#new' }

  const { data, error } = await listPosts({ limit: 30 })
  const list = document.getElementById('cm-list')
  if (error) { list.innerHTML = `<div class="cm-empty">목록을 불러오지 못했어요. 잠시 후 다시 시도해주세요.</div>`; return }
  if (!data.length) {
    list.innerHTML = `<div class="cm-empty"><span class="e">🌲</span>
      아직 글이 없어요. 첫 이야기를 남겨보세요!</div>`
    return
  }
  const liked = await getMyLikes(data.map(p => p.id))
  list.innerHTML = data.map(p => {
    const imgs = Array.isArray(p.image_urls) ? p.image_urls.slice(0, 3) : []
    const thumbs = imgs.length
      ? `<div class="cm-thumbs">${imgs.map(u => `<img src="${esc(u)}" loading="lazy" alt="">`).join('')}</div>` : ''
    return `<a class="cm-post" data-id="${esc(p.id)}">
      ${authorBlock(p.author, p.created_at)}
      <h2 class="cm-title">${esc(p.title)}</h2>
      <div class="cm-snippet">${esc(p.body)}</div>
      ${thumbs}
      <div class="cm-stat"><span>${liked.has(p.id) ? '❤️' : '🤍'} ${p.like_count ?? 0}</span>
        <span>💬 ${p.comment_count ?? 0}</span></div>
    </a>`
  }).join('')
  list.querySelectorAll('.cm-post').forEach(el =>
    el.onclick = () => { location.hash = '#post=' + el.dataset.id })
}

// ── 작성 ───────────────────────────────────────────────────────────────
function renderCompose() {
  if (!canParticipate()) { location.hash = ''; return }
  const pending = []   // 업로드된 이미지 URL
  root.innerHTML = `
    <span class="cm-back" id="cm-cancel">← 목록으로</span>
    <div class="cm-form">
      <label>제목</label>
      <input type="text" id="cm-t" maxlength="100" placeholder="제목 (2~100자)">
      <label>내용</label>
      <textarea id="cm-b" maxlength="10000" placeholder="사용기·질문·꿀팁을 자유롭게 적어주세요 (10자 이상)"></textarea>
      <div class="cm-count" id="cm-bc">0 / 10000</div>
      <label>사진 (선택 · 최대 4장 · 각 5MB)</label>
      <div class="cm-up" id="cm-up">
        <button type="button" class="addimg" id="cm-addimg">＋</button>
        <input type="file" id="cm-file" accept="image/*" multiple hidden>
      </div>
      <p style="font-size:11.5px;color:var(--muted);line-height:1.5;margin:8px 0 0">
        등록 시 <a href="terms.html" target="_blank" rel="noopener">이용약관</a>에 동의합니다.
        욕설·혐오·불법·아동에게 유해한 콘텐츠는 무관용으로 삭제·제재되며, 부적절한 글은 신고할 수 있습니다.
      </p>
      <div class="cm-actions">
        <button class="cm-btn ghost" id="cm-cancel2" type="button">취소</button>
        <button class="cm-btn" id="cm-submit" type="button">등록</button>
      </div>
      <div class="cm-err" id="cm-err"></div>
    </div>`

  const t = document.getElementById('cm-t')
  const b = document.getElementById('cm-b')
  const bc = document.getElementById('cm-bc')
  const up = document.getElementById('cm-up')
  const file = document.getElementById('cm-file')
  const err = document.getElementById('cm-err')
  const submit = document.getElementById('cm-submit')

  b.addEventListener('input', () => { bc.textContent = `${b.value.length} / 10000` })
  const cancel = () => { location.hash = '' }
  document.getElementById('cm-cancel').onclick = cancel
  document.getElementById('cm-cancel2').onclick = cancel
  document.getElementById('cm-addimg').onclick = () => file.click()

  function renderPreviews() {
    up.querySelectorAll('.prev').forEach(n => n.remove())
    const add = document.getElementById('cm-addimg')
    pending.forEach((u, i) => {
      const d = document.createElement('div')
      d.className = 'prev'
      d.innerHTML = `<img src="${esc(u)}" alt=""><button type="button" data-i="${i}" aria-label="삭제">✕</button>`
      d.querySelector('button').onclick = () => { pending.splice(i, 1); renderPreviews() }
      up.insertBefore(d, add)
    })
    add.style.display = pending.length >= 4 ? 'none' : ''
  }

  file.addEventListener('change', async () => {
    err.textContent = ''
    const files = Array.from(file.files).slice(0, 4 - pending.length)
    file.value = ''
    for (const f of files) {
      const r = await uploadImage(f)
      if (r.error) { err.textContent = getErrorMessage(r.error) || (r.error.message || '업로드 실패'); continue }
      pending.push(r.url); renderPreviews()
    }
  })

  submit.onclick = async () => {
    err.textContent = ''
    const title = t.value.trim(), body = b.value.trim()
    if (title.length < 2) { err.textContent = '제목은 2자 이상이어야 해요'; return }
    if (body.length < 10) { err.textContent = '내용은 10자 이상이어야 해요'; return }
    submit.disabled = true; submit.textContent = '등록 중…'
    const { data, error } = await createPost({ title, body, image_urls: pending })
    if (error) {
      err.textContent = getErrorMessage(error)
      submit.disabled = false; submit.textContent = '등록'
      return
    }
    if (data?.id) location.hash = '#post=' + data.id
    else location.hash = ''
  }
  setTimeout(() => t.focus(), 50)
}

// ── 상세 ───────────────────────────────────────────────────────────────
async function renderDetail(id) {
  root.innerHTML = `<span class="cm-back" id="cm-back">← 목록으로</span>
    <div class="cm-spin">불러오는 중…</div>`
  document.getElementById('cm-back').onclick = () => { location.hash = '' }

  const { data: post, error } = await getPost(id)
  if (error || !post) {
    root.innerHTML = `<span class="cm-back" id="cm-back2">← 목록으로</span>
      <div class="cm-empty">글을 찾을 수 없어요. 삭제되었거나 숨김 처리된 글일 수 있어요.</div>`
    document.getElementById('cm-back2').onclick = () => { location.hash = '' }
    return
  }

  const imgs = Array.isArray(post.image_urls) ? post.image_urls : []
  const liked = (await getMyLikes([post.id])).has(post.id)
  const isMine = me && post.user_id === me.user.id

  root.innerHTML = `
    <span class="cm-back" id="cm-back">← 목록으로</span>
    <div class="cm-detail">
      ${authorBlock(post.author, post.created_at)}
      <h1>${esc(post.title)}</h1>
      <div class="cm-body">${esc(post.body)}</div>
      ${imgs.length ? `<div class="cm-imgs">${imgs.map(u => `<img src="${esc(u)}" loading="lazy" alt="">`).join('')}</div>` : ''}
      <div class="cm-toolbar">
        <button class="cm-like${liked ? ' on' : ''}" id="cm-like">${liked ? '❤️' : '🤍'} <span id="cm-likec">${post.like_count ?? 0}</span></button>
        ${isMine ? `<button class="cm-del" id="cm-del">삭제</button>`
                 : `<button class="cm-report" id="cm-report">🚩 신고</button>`}
      </div>
      <div class="cm-cmts" id="cm-cmts"></div>
    </div>`
  document.getElementById('cm-back').onclick = () => { location.hash = '' }

  // 좋아요
  const likeBtn = document.getElementById('cm-like')
  const likeC = document.getElementById('cm-likec')
  let likedState = liked
  likeBtn.onclick = async () => {
    if (!canParticipate()) { alert('로그인 후 닉네임을 설정하면 좋아요를 누를 수 있어요.'); return }
    likeBtn.disabled = true
    const r = await toggleLike(post.id, likedState)
    likeBtn.disabled = false
    if (r.error) { alert(getErrorMessage(r.error)); return }
    likedState = r.liked
    likeBtn.classList.toggle('on', likedState)
    likeC.textContent = Math.max(0, (+likeC.textContent || 0) + (likedState ? 1 : -1))
    likeBtn.firstChild.textContent = (likedState ? '❤️' : '🤍') + ' '
  }

  // 삭제 / 신고
  const delBtn = document.getElementById('cm-del')
  if (delBtn) delBtn.onclick = async () => {
    if (!confirm('이 글을 삭제할까요?')) return
    const { error } = await deletePost(post.id)
    if (error) { alert(getErrorMessage(error)); return }
    location.hash = ''
  }
  const repBtn = document.getElementById('cm-report')
  if (repBtn) repBtn.onclick = async () => {
    if (!canParticipate()) { alert('로그인 후 신고할 수 있어요.'); return }
    const reason = prompt('신고 사유를 적어주세요 (5자 이상)')
    if (!reason || reason.trim().length < 5) return
    const { error } = await reportContent({ target_type: 'post', target_id: post.id, reason: reason.trim() })
    alert(error ? getErrorMessage(error) : '신고가 접수되었어요. 검토 후 조치합니다.')
  }

  renderComments(post.id)
}

async function renderComments(postId) {
  const box = document.getElementById('cm-cmts')
  if (!box) return
  const { data, error } = await listComments(postId)
  const formHtml = canParticipate()
    ? `<div class="cm-cform">
         <textarea id="cm-ct" maxlength="1000" placeholder="댓글 달기…"></textarea>
         <button class="cm-btn" id="cm-csend" type="button">등록</button>
       </div>`
    : loginHint('댓글로')
  const listHtml = (error || !data.length)
    ? (error ? '' : `<p style="color:var(--muted);font-size:13.5px;padding:8px 0">첫 댓글을 남겨보세요.</p>`)
    : data.map(c => `<div class="cm-cmt">${authorBlock(c.author, c.created_at)}
        <div class="t">${esc(c.body)}</div></div>`).join('')
  box.innerHTML = `<h2 class="sec">댓글 ${data?.length ?? 0}</h2>${formHtml}<div id="cm-clist">${listHtml}</div>`

  const send = document.getElementById('cm-csend')
  if (send) send.onclick = async () => {
    const ta = document.getElementById('cm-ct')
    const body = ta.value.trim()
    if (!body) return
    send.disabled = true; send.textContent = '…'
    const { error: e } = await createComment({ post_id: postId, body })
    send.disabled = false; send.textContent = '등록'
    if (e) { alert(getErrorMessage(e)); return }
    ta.value = ''
    renderComments(postId)   // 새로고침
  }
}

// ── 라우팅 ─────────────────────────────────────────────────────────────
function route() {
  const h = location.hash
  if (h.startsWith('#post=')) return renderDetail(decodeURIComponent(h.slice(6)))
  if (h === '#new') return renderCompose()
  return renderFeed()
}

window.addEventListener('hashchange', route)

// ── 원클릭 로그 작성 (account 세트 → "커뮤니티에 공유") (H-35) ───────────────
// community.html?open-log=1&set=N 으로 진입하면 글쓰기 폼을 자동으로 열고,
// set=N 이 있으면 해당 세트(localStorage gear_sets[N])의 장비를 본문에 미리 채운다.
// 인증이 비동기로 확정되므로(초기엔 canParticipate=false) auth 콜백에서도 재시도한다.
const _qp = new URLSearchParams(location.search)
const _openLog = _qp.get('open-log') === '1'
const _openLogSet = _openLog ? _qp.get('set') : null
if (_openLog) history.replaceState(null, '', location.pathname)  // 새로고침 중복 오픈 방지
let _openLogDone = false
function tryOpenLog() {
  if (_openLogDone || !_openLog) return
  if (!canParticipate()) return            // 로그인+닉네임 확정 전이면 보류(콜백에서 재시도)
  _openLogDone = true
  location.hash = ''                        // 해시 라우팅과 충돌 방지
  renderCompose()
  if (_openLogSet != null && typeof getSets === 'function') {
    const set = getSets()[+_openLogSet]
    if (set) {
      const t = document.getElementById('cm-t')
      const b = document.getElementById('cm-b')
      if (t && !t.value) t.value = `${set.title || '내 세트'} 공유`
      if (b) {
        const lines = (set.items || []).map(x =>
          `· ${`${x.b || ''} ${x.m || ''}`.trim()}${x.qty > 1 ? ` ×${x.qty}` : ''}`).join('\n')
        b.value = `[${set.title || '세트'}] 장비 구성\n${lines}\n\n`
        b.dispatchEvent(new Event('input'))   // 글자수 카운터 갱신
      }
    }
  }
}

// 피드/상세는 공개 데이터라 인증을 기다릴 필요가 없다 → 즉시 1차 렌더.
// (supabase-js 로딩·getSession 완료를 기다리지 않으므로 "불러오는 중"이 길게 보이지 않음)
route()

// 인증은 병렬로 확인. 참여 가능 여부(글쓰기/좋아요 상태)가 실제로 바뀐 경우에만
// 재렌더 → 같은 콜백이 두 번(INITIAL + INITIAL_SESSION) 불려도, 토큰이 갱신돼도 중복 fetch 없음.
await initAuth(async (user) => {
  const before = canParticipate()
  if (user) {
    me = { user }
    const profile = await getProfile()
    myProfileNick = profile?.nickname ?? null
  } else {
    me = null; myProfileNick = null
  }
  if (before !== canParticipate()) route()
  tryOpenLog()   // 인증 확정 후 원클릭 로그 작성 처리 (H-35)
})
</script>
</body>
</html>
