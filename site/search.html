<body>
<a class="skip-link" href="#main">메인 콘텐츠로 바로가기</a>
<header class="top"><div class="wrap">
  <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none"><img class="logo-mark" src="icon-192.png" alt="" width="26" height="26">장비의 <b>숲</b></a></div>
  <div class="sub">정량 스펙을 세그먼트 내 순위로 별점화 · 브랜드 제품만 · 측정값만</div>
  <a href="account.html" class="header-acct" aria-label="내 계정"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></a>
</div></header>
<main class="wrap" id="main">
  <h1 id="search-heading" style="margin-top:22px">검색</h1>

  <form role="search" onsubmit="return false" style="position:relative;margin-bottom:16px">
    <input id="homeq" type="text" placeholder="브랜드·모델 검색 (예: 헬리녹스, 호넷, 펜타…)" autocomplete="off"
      style="width:100%;box-sizing:border-box;padding:12px 40px 12px 16px;border:2px solid var(--accent);border-radius:12px;font-size:15px;background:var(--card);color:var(--txt);outline:none">
    <button id="homeq-clear" type="button" aria-label="검색어 지우기"
      style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);padding:4px">✕</button>
  </form>

  <div id="search-results"></div>
</main>

<footer><div class="wrap" id="foot"></div></footer>

<script src="app.js?v=dd536153"></script>
<script>
(function() {
  const inp = document.getElementById('homeq');
  const clr = document.getElementById('homeq-clear');
  inp.addEventListener('input', () => { clr.style.display = inp.value ? 'block' : 'none'; });
  clr.onclick = () => { inp.value = ''; clr.style.display = 'none'; inp.dispatchEvent(new Event('input')); inp.focus(); };

  const q = new URLSearchParams(location.search).get('q') || '';
  if (q) document.getElementById('search-heading').textContent = '"' + q + '" 검색 결과';

  setupSearchPage();
})();
</script>
</body>
</html>
